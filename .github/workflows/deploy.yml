name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Authenticate with GCP — keyless via Workload Identity Federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/581686806880/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@project-bec3bbbc-a067-4b2c-8fd.iam.gserviceaccount.com'

      # 3. Set up gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Configure Docker to push to Google Container Registry
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # 5. Build the container image
      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/project-bec3bbbc-a067-4b2c-8fd/earningsbloom:${{ github.sha }} \
            -t gcr.io/project-bec3bbbc-a067-4b2c-8fd/earningsbloom:latest .

      # 6. Push to Google Container Registry
      - name: Push to GCR
        run: |
          docker push gcr.io/project-bec3bbbc-a067-4b2c-8fd/earningsbloom:${{ github.sha }}
          docker push gcr.io/project-bec3bbbc-a067-4b2c-8fd/earningsbloom:latest

      # 7. Deploy new revision to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy earningsbloom \
            --image gcr.io/project-bec3bbbc-a067-4b2c-8fd/earningsbloom:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest,SEC_EDGAR_USER_AGENT=SEC_EDGAR_USER_AGENT:latest,FLASK_SECRET_KEY=FLASK_SECRET_KEY:latest,ADSENSE_PUBLISHER_ID=ADSENSE_PUBLISHER_ID:latest,PIPELINE_SECRET=PIPELINE_SECRET:latest \
            --memory 1Gi \
            --min-instances 0 \
            --max-instances 5 \
            --project project-bec3bbbc-a067-4b2c-8fd \
            --quiet

      - name: Done
        run: echo "✅ EarningsBloom live (commit ${{ github.sha }})"
